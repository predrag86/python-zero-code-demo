name: OSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"

permissions:
  # Required to upload SARIF results to the Security tab
  security-events: write
  # Required by the Scorecard action to read repo contents
  contents: read
  # Required to publish results to the dependency graph
  actions: read
  id-token: write

jobs:
  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: scorecard.sarif
          results_format: sarif
          # Publish results to the OpenSSF REST API for the badge
          publish_results: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: scorecard.sarif
          category: ossf-scorecard
