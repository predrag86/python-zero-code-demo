name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs on the same branch (except main — don't abort a release mid-flight)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write          # semantic-release: push version commit + tag
  packages: write          # push image to GHCR
  id-token: write          # build provenance / SBOM attestations

# ── Job 1: Ruff ─────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Use a token that can push back to the branch (needed for auto-fix commits).
          # Falls back to GITHUB_TOKEN which works for branch pushes but not fork PRs.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - run: pip install -r requirements-dev.txt

      - name: ruff fix
        run: |
          ruff check --fix .
          ruff format .

      - name: Commit fixes if any
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
        run: |
          if ! git diff --quiet; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -u
            git commit -m "style: auto-fix ruff issues"
            git push
          fi

# ── Job 2: MyPy ─────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: mypy app.py

# ── Job 3: Pytest ────────────────────────────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest --tb=short -v

# ── Job 4: Semantic Release (main only) ──────────────────────────────────────
# Analyzes commits since the last tag (Angular convention: fix/feat/BREAKING CHANGE),
# bumps the version in pyproject.toml, commits, tags, and creates a GitHub release.
  release:
    name: Semantic Release
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      released: ${{ steps.semrel.outputs.released }}
      version: ${{ steps.semrel.outputs.version }}
      tag: ${{ steps.semrel.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python Semantic Release
        id: semrel
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

# ── Job 5: Docker build, smoke test, Trivy scan, push ───────────────────────
  docker:
    name: Docker
    needs: [lint, typecheck, test, release]
    runs-on: ubuntu-latest
    # Run when quality gates pass regardless of whether 'release' ran (PRs skip it)
    if: |
      always() &&
      needs.lint.result == 'success' &&
      needs.typecheck.result == 'success' &&
      needs.test.result == 'success' &&
      (needs.release.result == 'success' || needs.release.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # needed so metadata-action can read git tags

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute image tags:
      #   on main with a new release → <version>, sha-<sha>, latest
      #   on main without a new release → sha-<sha>, latest
      #   on PRs → sha-<sha> only (image not pushed)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.release.outputs.version }},enable=${{ needs.release.outputs.released == 'true' }}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}

      # ── Build the test stage ──────────────────────────────────────────────
      # Runs ruff, mypy, and pytest inside the container to confirm the image
      # build environment is clean — separate from the native CI jobs above.
      - name: Build Docker test stage
        uses: docker/build-push-action@v7
        with:
          context: .
          target: test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build runtime image locally ───────────────────────────────────────
      # Loads into the local Docker daemon for smoke test and Trivy.
      # Uses the GHA layer cache warmed by the test-stage build above.
      - name: Build runtime image (local load)
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          load: true
          tags: inventory-service:ci
          cache-from: type=gha

      # ── Smoke test ────────────────────────────────────────────────────────
      - name: Smoke test
        run: |
          trap 'docker rm -f inventory-ci 2>/dev/null || true' EXIT

          docker run -d \
            --name inventory-ci \
            -p 5000:5000 \
            -e OTEL_SDK_DISABLED=true \
            inventory-service:ci

          echo "Waiting for app to be ready..."
          timeout 30 bash -c 'until curl -sf http://localhost:5000/healthz > /dev/null; do sleep 1; done'
          echo "App is ready."

          curl -sf http://localhost:5000/ | jq -e '.status == "ok"'
          curl -sf http://localhost:5000/items | jq -e 'type == "array"'
          curl -sf http://localhost:5000/items/1 | jq -e '.id == 1'

          status=$(curl -o /dev/null -sw "%{http_code}" http://localhost:5000/items/9999)
          [[ "$status" == "404" ]] || { echo "Expected 404 for /items/9999, got $status"; exit 1; }

          curl -sf http://localhost:5000/process | jq -e 'has("result")'

      # ── Trivy: fail on unfixed CRITICAL/HIGH ──────────────────────────────
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: inventory-service:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # ── SBOM ──────────────────────────────────────────────────────────────
      - name: Generate SBOM
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: inventory-service:ci
          format: spdx-json
          output: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

      # ── Push to GHCR (main only) ──────────────────────────────────────────
      # Re-runs the build with push=true. The GHA layer cache makes this ~instant.
      - name: Push to GHCR
        id: push
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          platforms: linux/amd64
          provenance: true
          sbom: true

      # ── Cosign: keyless sign + SBOM attestation (main only) ───────────────
      # Signing uses GitHub OIDC — no private key needed.
      # Verify with:
      #   cosign verify \
      #     --certificate-identity-regexp="https://github.com/<owner>/<repo>/.*" \
      #     --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
      #     ghcr.io/<owner>/<repo>:<tag>
      - name: Install Cosign
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}

      - name: Attest SBOM
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            ghcr.io/${{ github.repository }}@${{ steps.push.outputs.digest }}
